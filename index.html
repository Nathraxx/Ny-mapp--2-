<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Android Invaders: Pause & Glow Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px; 
            height: 100%;
            background-color: #020208;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        canvas { 
            display: block; width: 100%; height: 100%; 
            object-fit: contain; 
        }
        
        /* --- HUD --- */
        #ui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: none; 
            justify-content: space-between;
            font-size: 16px; font-weight: bold; pointer-events: none;
            color: #fff; text-shadow: 0 0 5px #0ff, 0 0 10px #0ff; z-index: 10;
        }
        .ui-column { display: flex; flex-direction: column; gap: 5px; }
        .text-right { text-align: right; align-items: flex-end; }
        .weapon-text { color: #f0f; text-shadow: 0 0 5px #f0f, 0 0 10px #f0f; }
        
        #pause-btn {
            font-size: 28px; cursor: pointer; pointer-events: auto;
            text-shadow: 0 0 10px #fff; margin-bottom: 5px; user-select: none;
        }
        #pause-btn:active { opacity: 0.5; }

        /* --- MENUS --- */
        .menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(2, 2, 8, 0.7); z-index: 20; backdrop-filter: blur(3px);
        }
        .hidden { display: none !important; }
        
        .title { 
            color: #fff; font-size: 42px; margin-bottom: 5px; text-align: center;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; line-height: 1.1;
        }
        .version-text { color: #555; font-size: 14px; margin-bottom: 30px; font-weight: bold; }
        .title-red { color: #f00; text-shadow: 0 0 10px #f00, 0 0 20px #f00, 0 0 40px #f00; }
        
        .menu-btn {
            margin: 10px; padding: 15px 40px; font-size: 20px;
            background: rgba(0, 255, 0, 0.1); color: #0f0; border: 2px solid #0f0; font-weight: bold;
            border-radius: 5px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0; text-shadow: 0 0 5px #0f0;
            font-family: 'Courier New', Courier, monospace; width: 250px;
        }
        .menu-btn:active { background: rgba(0, 255, 0, 0.4); }
        .btn-red { 
            color: #f00; border-color: #f00; background: rgba(255, 0, 0, 0.1);
            box-shadow: 0 0 10px #f00, inset 0 0 10px #f00; text-shadow: 0 0 5px #f00;
        }
        .btn-red:active { background: rgba(255, 0, 0, 0.4); }
        
        .btn-blue { 
            color: #0ff; border-color: #0ff; background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff; text-shadow: 0 0 5px #0ff;
        }
        .btn-blue:active { background: rgba(0, 255, 255, 0.4); }

        .hs-table {
            width: 80%; max-width: 320px; margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5); border: 2px solid #333; padding: 15px; border-radius: 8px;
        }
        .hs-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; padding: 8px 0; border-bottom: 1px solid #222; }
        .hs-row:last-child { border-bottom: none; }
        
        /* --- SLIDERS --- */
        .slider-container { margin: 15px 0; width: 80%; max-width: 250px; text-align: center; }
        .slider-label { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; font-family: 'Courier New', Courier, monospace; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 25px; width: 15px; border-radius: 3px;
            background: #fff; cursor: pointer; border: 2px solid #000; box-shadow: 0 0 10px #fff;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #333; border-radius: 4px; border: 1px solid #111; }

        /* --- CONTROLS --- */
        #controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: none; 
            justify-content: space-between; align-items: flex-end; 
            padding: 0 20px; box-sizing: border-box; z-index: 15;
        }
        
        #joystick-base {
            width: 120px; height: 120px; background: rgba(0, 255, 255, 0.1);
            border-radius: 50%; border: 2px solid rgba(0, 255, 255, 0.5);
            position: relative; touch-action: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.2);
            margin-bottom: 10px;
        }
        
        #joystick-knob {
            width: 50px; height: 50px; background: rgba(0, 255, 255, 0.7);
            border-radius: 50%; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #0ff; pointer-events: none;
            transition: transform 0.1s ease-out; 
        }

        .action-buttons { display: flex; gap: 15px; align-items: flex-end; }
        .btn { display: flex; justify-content: center; align-items: center; border-radius: 50%; user-select: none; backdrop-filter: blur(2px); }
        
        #shoot-btn { 
            width: 80px; height: 80px; background: rgba(255, 0, 0, 0.1); font-size: 30px;
            border: 2px solid #f00; box-shadow: 0 0 15px #f00, inset 0 0 10px #f00; touch-action: none;
        }
        #shoot-btn:active { background: rgba(255, 0, 0, 0.4); }
        
        #nuke-btn { 
            width: 60px; height: 60px; font-size: 24px;
            border: 2px solid #fa0; color: #fa0;
            opacity: 0.8; transition: box-shadow 0.2s, background 0.2s; touch-action: none;
            /* Default dynamic styling handled in JS */
        }
        .nuke-ready { 
            background: rgba(255, 170, 0, 0.4) !important; 
            box-shadow: 0 0 30px #fa0, inset 0 0 15px #fa0 !important; opacity: 1 !important; 
        }
        #nuke-btn:active { background: rgba(255, 170, 0, 0.6) !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="start-menu" class="menu-screen">
            <h1 class="title">ANDROID<br>INVADERS</h1>
            <div class="version-text">v1.2</div>
            <button class="menu-btn" onclick="startGame()">INSERT COIN</button>
            <button class="menu-btn btn-blue" onclick="showOptionsMenu()">SETTINGS</button>
            <button class="menu-btn" onclick="showHighscoreMenu()">HIGHSCORES</button>
        </div>

        <div id="options-menu" class="menu-screen hidden">
            <h1 class="title" style="color: #0ff; text-shadow: 0 0 20px #0ff; font-size: 36px;">SETTINGS</h1>
            <button id="mute-btn" class="menu-btn" onclick="toggleMusic()">MUSIC: ON</button>
            
            <div class="slider-container">
                <label class="slider-label" style="color: #0ff; text-shadow: 0 0 5px #0ff;">MUSIC VOL</label>
                <input type="range" id="music-slider" min="0" max="100" value="40" oninput="updateAudioSettings()">
            </div>
            <div class="slider-container">
                <label class="slider-label" style="color: #ff0; text-shadow: 0 0 5px #ff0;">SFX VOL</label>
                <input type="range" id="sfx-slider" min="0" max="100" value="100" oninput="updateAudioSettings()">
            </div>
            <button class="menu-btn btn-red" style="margin-top: 20px;" onclick="closeOptionsMenu()">BACK</button>
        </div>

        <div id="highscore-menu" class="menu-screen hidden">
            <h1 class="title" style="color: #ff0; text-shadow: 0 0 20px #ff0; font-size: 36px;">HALL OF FAME</h1>
            <div class="hs-table">
                <div class="hs-row" style="color: #0ff;"><span>1. Yasuo</span><span>9,999,990</span></div>
                <div class="hs-row" style="color: #ff0;"><span>2. John Cleese</span><span>42,069</span></div>
                <div class="hs-row" style="color: #ccc;"><span>3. Blitzcrank</span><span>13,337</span></div>
                <div class="hs-row" style="color: #c85;"><span>4. Leeroy J.</span><span>5,000</span></div>
                <div class="hs-row" style="color: #fff;"><span>5. YOU</span><span id="menu-personal-high">0</span></div>
            </div>
            <button class="menu-btn btn-red" onclick="showStartMenu()">BACK</button>
        </div>

        <div id="game-over-menu" class="menu-screen hidden">
            <h1 class="title title-red">GAME OVER</h1>
            <h2 style="color: #fff; margin-bottom: 20px;">FINAL SCORE: <span id="final-score" style="color:#0f0;">0</span></h2>
            <button class="menu-btn" onclick="startGame()">PLAY AGAIN</button>
            <button class="menu-btn btn-red" onclick="showStartMenu()">MAIN MENU</button>
        </div>

        <div id="ui">
            <div class="ui-column">
                <div>HP: <span id="hp-display">❤️❤️❤️</span></div>
                <div>SCORE: <span id="score">0</span></div>
                <div>WAVE: <span id="wave">1</span></div>
            </div>
            <div class="ui-column text-right">
                <div id="pause-btn" onclick="pauseGame()">⏸️</div>
                <div class="weapon-text" id="weapon-display">LVL 0: SINGLE</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls">
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
            <div class="action-buttons">
                <div class="btn" id="nuke-btn">☢️</div>
                <div class="btn" id="shoot-btn">🔥</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 800;

        // --- AUDIO SYSTEM & SETTINGS ---
        const bgMusic = new Audio('2019-12-11_-_Retro_Platforming_-_David_Fesliyan.mp3');
        bgMusic.loop = true; 
        
        const sfxShoot = new Audio('freesound_community-laser-45816.mp3'); 
        const sfxExplosion = new Audio('rajatchoudhary-single-clap-sound-effect-355862.mp3'); 
        const sfxPlayerDeath = new Audio('soundreality-explosion-8-bit-8-314694.mp3');

        let masterMusicVol = localStorage.getItem('invadersMusicVol') !== null ? parseFloat(localStorage.getItem('invadersMusicVol')) : 0.4;
        let masterSfxVol = localStorage.getItem('invadersSfxVol') !== null ? parseFloat(localStorage.getItem('invadersSfxVol')) : 1.0;
        let isMusicMuted = localStorage.getItem('invadersMusicMute') === 'true';
        let musicStarted = false;

        document.getElementById('music-slider').value = masterMusicVol * 100;
        document.getElementById('sfx-slider').value = masterSfxVol * 100;
        updateMuteButtonUI();
        applyVolumes();

        function updateAudioSettings() {
            masterMusicVol = document.getElementById('music-slider').value / 100;
            masterSfxVol = document.getElementById('sfx-slider').value / 100;
            localStorage.setItem('invadersMusicVol', masterMusicVol);
            localStorage.setItem('invadersSfxVol', masterSfxVol);
            applyVolumes();
        }

        function applyVolumes() {
            bgMusic.volume = isMusicMuted ? 0 : masterMusicVol;
            sfxShoot.volume = Math.min(1, masterSfxVol * 0.2); 
            sfxExplosion.volume = Math.min(1, masterSfxVol * 0.5);
            sfxPlayerDeath.volume = Math.min(1, masterSfxVol * 0.8);
        }

        function toggleMusic() {
            isMusicMuted = !isMusicMuted;
            localStorage.setItem('invadersMusicMute', isMusicMuted);
            updateMuteButtonUI();
            applyVolumes();
        }

        function updateMuteButtonUI() {
            const btn = document.getElementById('mute-btn');
            if (isMusicMuted) {
                btn.innerText = "MUSIC: OFF"; btn.className = "menu-btn btn-red";
            } else {
                btn.innerText = "MUSIC: ON"; btn.className = "menu-btn";
            }
        }

        function unlockAudio() {
            if (musicStarted) return;
            sfxShoot.load(); sfxExplosion.load(); sfxPlayerDeath.load();
            bgMusic.play().then(() => {
                musicStarted = true;
                document.removeEventListener('touchstart', unlockAudio);
                document.removeEventListener('click', unlockAudio);
            }).catch(e => { console.log("Awaiting interaction for audio..."); });
        }
        document.addEventListener('touchstart', unlockAudio, { once: false });
        document.addEventListener('click', unlockAudio, { once: false });

        function playSound(audioNode) {
            if (!musicStarted || masterSfxVol === 0) return; 
            const clone = audioNode.cloneNode();
            clone.volume = audioNode.volume;
            if (audioNode === sfxExplosion || audioNode === sfxPlayerDeath) clone.currentTime = 0.15; 
            clone.play().catch(e => {});
        }

        // --- ASSETS ---
        const playerImg = new Image(); playerImg.src = 'spaceShips_002.png'; 
        const alienImg = new Image(); alienImg.src = 'alien.png';
        let assetsLoaded = 0; const totalAssets = 2;
        function assetLoaded() { assetsLoaded++; if (assetsLoaded === totalAssets) requestAnimationFrame(loop); }
        playerImg.onload = assetLoaded; alienImg.onload = assetLoaded;
        playerImg.onerror = () => assetLoaded(); alienImg.onerror = () => assetLoaded();

        // --- STATE MACHINE ---
        let gameState = 'MENU'; // 'MENU', 'PLAYING', 'OPTIONS', 'GAMEOVER', 'HIGHSCORE'
        let previousGameState = 'MENU'; // Tracks where to go back from Options
        
        let score = 0;
        let wave = 1;
        let highScore = localStorage.getItem('invadersHighScore') || 0;
        document.getElementById('menu-personal-high').innerText = highScore;

        let nextBossWave = 3;
        let bossInterval = 3;
        let bossKills = 1;

        const input = { left: false, right: false, up: false, down: false, shoot: false, joyX: 0, joyY: 0 };
        
        const player = { 
            x: 200, y: 550, width: 45, height: 45, 
            baseSpeed: 7, speed: 7, weaponLevel: 0,
            baseFireRate: 350, fireRate: 350, lastShotTime: 0,
            hp: 3, maxHp: 3, invulnerableUntil: 0, killsForNuke: 0
        }; 

        const weaponNames = ["LVL 0: SINGLE", "LVL 1: DUAL", "LVL 2: TRIPLE", "LVL 3: PLASMA LASER"];

        let bullets = []; let enemyBullets = []; let aliens = []; let asteroids = []; 
        let powerups = []; let flashes = []; let particles = []; let stars = [];
        let alienDirection = 1; let alienSpeed = 0.5; let boss = null; 

        // --- UI MANAGEMENT ---
        function showStartMenu() {
            gameState = 'MENU';
            document.getElementById('start-menu').classList.remove('hidden');
            document.getElementById('highscore-menu').classList.add('hidden');
            document.getElementById('options-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
            document.getElementById('ui').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
        }

        function showHighscoreMenu() {
            gameState = 'HIGHSCORE';
            document.getElementById('menu-personal-high').innerText = localStorage.getItem('invadersHighScore') || 0;
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('highscore-menu').classList.remove('hidden');
        }

        function showOptionsMenu() {
            previousGameState = gameState;
            gameState = 'OPTIONS';
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('options-menu').classList.remove('hidden');
        }
        
        function pauseGame() {
            if (gameState !== 'PLAYING') return;
            showOptionsMenu();
        }

        function closeOptionsMenu() {
            document.getElementById('options-menu').classList.add('hidden');
            if (previousGameState === 'PLAYING') {
                gameState = 'PLAYING';
            } else {
                showStartMenu();
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('final-score').innerText = score;
            if (score > highScore) { highScore = score; localStorage.setItem('invadersHighScore', highScore); }
            
            document.getElementById('ui').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            setTimeout(() => { document.getElementById('game-over-menu').classList.remove('hidden'); }, 1500); 
        }

        function startGame() {
            unlockAudio();
            gameState = 'PLAYING';
            score = 0; wave = 1; nextBossWave = 3; bossInterval = 3; bossKills = 1;
            
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('highscore-menu').classList.add('hidden');
            document.getElementById('options-menu').classList.add('hidden');
            document.getElementById('game-over-menu').classList.add('hidden');
            
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            
            player.x = canvas.width / 2; player.y = canvas.height - 200;
            player.weaponLevel = 0; player.speed = player.baseSpeed; player.fireRate = player.baseFireRate;
            player.hp = player.maxHp; player.killsForNuke = 0; player.invulnerableUntil = 0;
            document.getElementById('weapon-display').innerText = weaponNames[0];
            
            bullets = []; enemyBullets = []; particles = []; flashes = []; powerups = []; asteroids = []; 
            alienSpeed = 0.5; boss = null;
            input.left = false; input.right = false; input.up = false; input.down = false; input.shoot = false;
            input.joyX = 0; input.joyY = 0;
            
            updateHUD();
            initAliens();
        }

        function updateHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            let hpStr = "";
            for(let i = 0; i < player.hp; i++) hpStr += "❤️";
            document.getElementById('hp-display').innerText = hpStr || "💀";
            
            let nukeBtn = document.getElementById('nuke-btn');
            
            if (player.killsForNuke >= 50) {
                nukeBtn.classList.add("nuke-ready");
                nukeBtn.style.background = ""; // Clear inline styles
                nukeBtn.style.boxShadow = "";
            } else {
                nukeBtn.classList.remove("nuke-ready");
                // Math for dynamic fill and glow
                let fillPercent = (player.killsForNuke / 50) * 100;
                let glowAlpha = (player.killsForNuke / 50) * 0.8;
                
                nukeBtn.style.background = `linear-gradient(to top, rgba(255, 170, 0, 0.4) ${fillPercent}%, rgba(255, 170, 0, 0.05) ${fillPercent}%)`;
                nukeBtn.style.boxShadow = `0 0 ${fillPercent/2}px rgba(255, 170, 0, ${glowAlpha}), inset 0 0 5px #fa0`;
            }
        }

        // --- SPWNERS & EFFECTS ---
        function initStars() {
            stars = [];
            for(let i = 0; i < 75; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5 + 0.5, speed: Math.random() * 2 + 0.2 });
        }

        function spawnAsteroid() {
            let radius = Math.random() * 20 + 15; 
            let numVertices = Math.floor(Math.random() * 5) + 7; 
            let vertices = [];
            for(let i = 0; i < numVertices; i++) vertices.push(radius * (0.8 + Math.random() * 0.4));
            
            asteroids.push({
                x: Math.random() * canvas.width, y: -50,
                vx: (Math.random() - 0.5) * 0.8, vy: Math.random() * 1.0 + 0.8,   
                radius: radius, vertices: vertices, angle: 0, spin: (Math.random() - 0.5) * 0.03, 
                hp: Math.floor(radius / 10) 
            });
        }

        function createExplosion(x, y, color, scale = 1) {
            flashes.push({ x: x, y: y, radius: 25 * scale, life: 1.0, color: color });
            for(let i = 0; i < 40 * scale; i++) { 
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 8 + 2) * scale; 
                particles.push({
                    x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    life: 1.0, size: Math.random() * 4 + 1, 
                    color: Math.random() > 0.6 ? '#ffffff' : color, decay: Math.random() * 0.03 + 0.02 
                });
            }
        }

        function startNextWave() {
            wave++;
            bullets = []; enemyBullets = []; powerups = []; asteroids = [];
            
            if (wave === nextBossWave) {
                boss = {
                    x: canvas.width / 2, y: 100, width: 120, height: 120,
                    hp: 50 + (wave * 15) * bossKills, maxHp: 50 + (wave * 15) * bossKills,
                    vx: 2 + (wave * 0.1), lastShot: 0, fireRate: Math.max(200, 700 - (wave * 20)) 
                };
                aliens = []; 
            } else {
                boss = null;
                alienSpeed = 0.5 + (wave * 0.1); 
                initAliens();
            }
            updateHUD();
        }

        function initAliens() {
            aliens = [];
            const rows = 4, cols = 5, padding = 50, startX = 100, startY = 60; 
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    aliens.push({ x: startX + c * padding, y: startY + r * padding, targetY: startY + r * padding, width: 25, height: 25, alive: true });
                }
            }
        }

        function spawnPowerup(x, y) {
            const types = ['weapon', 'speed', 'rapid'];
            const type = types[Math.floor(Math.random() * types.length)];
            let color, letter;
            if(type === 'weapon') { color = '#ff00ff'; letter = 'W'; }
            if(type === 'speed') { color = '#00ffff'; letter = 'S'; }
            if(type === 'rapid') { color = '#ffff00'; letter = 'R'; }
            powerups.push({ x: x, y: y, size: 20, type: type, color: color, letter: letter, vy: 2 });
        }

        function addKill() {
            score += 10;
            if (player.killsForNuke < 50) player.killsForNuke++;
            updateHUD();
        }

        // --- ACTIONS ---
        function hitPlayer(timestamp) {
            if (timestamp < player.invulnerableUntil || gameState !== 'PLAYING') return;
            
            player.hp--;
            updateHUD();

            if (player.hp <= 0) {
                playSound(sfxPlayerDeath);
                createExplosion(player.x, player.y, '#00ffff', 6);
                createExplosion(player.x, player.y, '#ffffff', 4);
                gameOver();
            } else {
                playSound(sfxExplosion);
                createExplosion(player.x, player.y, '#ff0000', 1.5);
                player.invulnerableUntil = timestamp + 1000; 
            }
        }

        function triggerNuke() {
            if (player.killsForNuke >= 50 && gameState === 'PLAYING') {
                player.killsForNuke = 0;
                playSound(sfxExplosion); 
                flashes.push({ x: canvas.width/2, y: canvas.height/2, radius: canvas.height, life: 1.0, color: '#ffaa00' });
                
                aliens.forEach(a => { if(a.alive) { a.alive = false; createExplosion(a.x, a.y, '#ff00ff'); addKill(); }});
                asteroids.forEach(ast => { createExplosion(ast.x, ast.y, '#ffaa00', 1.5); score += 5; });
                asteroids = [];
                
                if(boss) {
                    boss.hp -= 250 * bossKills; 
                    createExplosion(boss.x, boss.y, '#ff0000', 3);
                    if(boss.hp <= 0) killBoss();
                }
                enemyBullets = []; updateHUD();
            }
        }

        function killBoss() {
            createExplosion(boss.x, boss.y, '#ff0000', 5); 
            playSound(sfxExplosion);
            score += 500 * bossKills; 
            updateHUD();
            
            bossInterval *= 2; nextBossWave += bossInterval; bossKills++;
            setTimeout(startNextWave, 2000); boss = null;
        }

        function tryShoot(timestamp) {
            if (timestamp - player.lastShotTime > player.fireRate) {
                player.lastShotTime = timestamp; playSound(sfxShoot);
                let speed = 14;
                switch(player.weaponLevel) {
                    case 0: bullets.push({ x: player.x, y: player.y - player.height/2, vx: 0, vy: -speed, pierce: false }); break;
                    case 1: 
                        bullets.push({ x: player.x - 15, y: player.y - player.height/2, vx: 0, vy: -speed, pierce: false });
                        bullets.push({ x: player.x + 15, y: player.y - player.height/2, vx: 0, vy: -speed, pierce: false }); break;
                    case 2: 
                        bullets.push({ x: player.x, y: player.y - player.height/2, vx: 0, vy: -speed, pierce: false });
                        bullets.push({ x: player.x - 12, y: player.y - player.height/2, vx: -3, vy: -speed*0.9, pierce: false });
                        bullets.push({ x: player.x + 12, y: player.y - player.height/2, vx: 3, vy: -speed*0.9, pierce: false }); break;
                    case 3: 
                    default:
                        bullets.push({ x: player.x, y: player.y - player.height/2, vx: 0, vy: -speed*2.5, pierce: true }); break;
                }
            }
        }

        // --- CORE LOOP ---
        function update(timestamp) {
            // Background objects still move when game is paused or dead
            if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
                if (Math.random() < 0.0075 && gameState === 'PLAYING') spawnAsteroid();

                for(let i = flashes.length - 1; i >= 0; i--) { let f = flashes[i]; f.radius += 2; f.life -= 0.1; if(f.life <= 0) flashes.splice(i, 1); }
                for(let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay; if(p.life <= 0) particles.splice(i, 1); }
            }

            if (gameState === 'PLAYING') {
                for(let i = asteroids.length - 1; i >= 0; i--) {
                    let ast = asteroids[i]; ast.x += ast.vx; ast.y += ast.vy; ast.angle += ast.spin;
                    if (Math.abs(ast.x - player.x) < player.width/2 + ast.radius - 5 && Math.abs(ast.y - player.y) < player.height/2 + ast.radius - 5) {
                        hitPlayer(timestamp); createExplosion(ast.x, ast.y, '#ffaa00', 1.5); playSound(sfxExplosion);
                        asteroids.splice(i, 1); continue;
                    }
                    if(ast.y > canvas.height + 50) asteroids.splice(i, 1);
                }

                for(let i = enemyBullets.length - 1; i >= 0; i--) {
                    enemyBullets[i].y += enemyBullets[i].vy;
                    if (Math.abs(enemyBullets[i].x - player.x) < player.width/2 - 5 && Math.abs(enemyBullets[i].y - player.y) < player.height/2 - 5) {
                        hitPlayer(timestamp); enemyBullets.splice(i, 1); continue;
                    }
                    if(enemyBullets[i].y > canvas.height + 20) enemyBullets.splice(i, 1);
                }
                
                for(let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].x += bullets[i].vx; bullets[i].y += bullets[i].vy;
                    if(bullets[i].y < -50 || bullets[i].x < -50 || bullets[i].x > canvas.width + 50) bullets.splice(i, 1);
                }

                let moveX = input.joyX; let moveY = input.joyY;
                if (input.left) moveX = -1; if (input.right) moveX = 1;
                if (input.up) moveY = -1; if (input.down) moveY = 1;
                if ((input.left || input.right) && (input.up || input.down)) { moveX *= 0.707; moveY *= 0.707; }

                player.x += player.speed * moveX; player.y += player.speed * moveY;
                
                if (player.x < player.width/2) player.x = player.width/2;
                if (player.x > canvas.width - player.width/2) player.x = canvas.width - player.width/2;
                if (player.y < player.height/2) player.y = player.height/2;
                
                const bottomBoundary = canvas.height - player.height/2 - 160; 
                if (player.y > bottomBoundary) player.y = bottomBoundary;
                
                if (input.shoot) tryShoot(timestamp);

                for(let i = powerups.length - 1; i >= 0; i--) {
                    let p = powerups[i]; p.y += p.vy;
                    if (Math.abs(p.x - player.x) < player.width/2 + p.size && Math.abs(p.y - player.y) < player.height/2 + p.size) {
                        playSound(sfxShoot); 
                        if(p.type === 'weapon' && player.weaponLevel < 3) {
                            player.weaponLevel++; document.getElementById('weapon-display').innerText = weaponNames[player.weaponLevel];
                        }
                        if(p.type === 'speed') player.speed += 1.5;
                        if(p.type === 'rapid' && player.fireRate > 100) player.fireRate -= 60;
                        powerups.splice(i, 1); continue;
                    }
                    if(p.y > canvas.height) powerups.splice(i, 1);
                }

                if (!boss) {
                    let edgeHit = false;
                    aliens.forEach(a => {
                        if (!a.alive) return;
                        a.x += alienSpeed * alienDirection;
                        if (a.x > canvas.width - a.width/2 - 10 && alienDirection === 1) edgeHit = true;
                        if (a.x < a.width/2 + 10 && alienDirection === -1) edgeHit = true;
                    });

                    if (edgeHit) {
                        alienDirection *= -1; alienSpeed += 0.05; 
                        aliens.forEach(a => { a.targetY += 30 + (wave * 2); });
                    }

                    aliens.forEach(a => {
                        if (!a.alive) return;
                        if (a.y < a.targetY) { a.y += 2; if (a.y > a.targetY) a.y = a.targetY; }
                        if (Math.abs(a.x - player.x) < player.width/2 + a.width/2 && Math.abs(a.y - player.y) < player.height/2 + a.height/2) hitPlayer(timestamp);
                        if (a.y > canvas.height - 100) { player.hp = 0; hitPlayer(timestamp); }
                    });

                    if (aliens.every(a => !a.alive)) startNextWave();

                } else {
                    boss.x += boss.vx;
                    if (boss.x > canvas.width - boss.width/2 || boss.x < boss.width/2) boss.vx *= -1;
                    if (Math.abs(boss.x - player.x) < boss.width/2 + player.width/2 && Math.abs(boss.y - player.y) < boss.height/2 + player.height/2) hitPlayer(timestamp);

                    if (timestamp - boss.lastShot > boss.fireRate) {
                        boss.lastShot = timestamp;
                        enemyBullets.push({ x: boss.x - 30, y: boss.y + boss.height/2, vy: 7 });
                        enemyBullets.push({ x: boss.x + 30, y: boss.y + boss.height/2, vy: 7 });
                    }
                }

                for (let bIndex = bullets.length - 1; bIndex >= 0; bIndex--) {
                    let b = bullets[bIndex]; let hitSomething = false;

                    for (let astIndex = 0; astIndex < asteroids.length; astIndex++) {
                        let ast = asteroids[astIndex];
                        if (Math.abs(b.x - ast.x) < ast.radius + 5 && Math.abs(b.y - ast.y) < ast.radius + 5) {
                            ast.hp--; hitSomething = true; createExplosion(b.x, b.y, '#ffaa00', 0.5); 
                            if (ast.hp <= 0) {
                                createExplosion(ast.x, ast.y, '#ffaa00', 1.5); playSound(sfxExplosion);
                                score += 5; updateHUD(); asteroids.splice(astIndex, 1);
                            }
                            break; 
                        }
                    }

                    if (!hitSomething) {
                        if (!boss) {
                            for (let aIndex = 0; aIndex < aliens.length; aIndex++) {
                                let a = aliens[aIndex];
                                if (a.alive && Math.abs(b.x - a.x) < a.width/2 + 10 && Math.abs(b.y - a.y) < a.height/2 + 10) {
                                    a.alive = false; hitSomething = true;
                                    createExplosion(a.x, a.y, '#ff00ff'); playSound(sfxExplosion); addKill();
                                    if (Math.random() < 0.1) spawnPowerup(a.x, a.y); 
                                    break;
                                }
                            }
                        } else {
                            if (Math.abs(b.x - boss.x) < boss.width/2 && Math.abs(b.y - boss.y) < boss.height/2) {
                                boss.hp--; hitSomething = true; createExplosion(b.x, b.y, '#ff0000', 0.4); score += 5; updateHUD();
                                if (boss.hp <= 0) killBoss();
                            }
                        }
                    }
                    if (hitSomething && !b.pierce) bullets.splice(bIndex, 1);
                }
            } else if (gameState === 'GAMEOVER') {
                aliens.forEach(a => { if (a.alive) a.y += 1; });
                if(boss) boss.y += 1;
            }
        }

        function draw(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Stars always move
            ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.size / 2; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
            });
            ctx.globalAlpha = 1.0;

            if ((gameState === 'PLAYING' || gameState === 'OPTIONS') && !(timestamp < player.invulnerableUntil && Math.floor(timestamp / 100) % 2 === 0)) {
                ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff';
                if (playerImg.complete && playerImg.naturalHeight !== 0) ctx.drawImage(playerImg, player.x - player.width/2, player.y - player.height/2, player.width, player.height);
                else { ctx.fillStyle = '#00ffff'; ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height); }
            }

            ctx.shadowColor = '#ff00ff';
            aliens.forEach(a => {
                if (!a.alive) return;
                if (alienImg.complete && alienImg.naturalHeight !== 0) ctx.drawImage(alienImg, a.x - a.width/2, a.y - a.height/2, a.width, a.height);
                else { ctx.fillStyle = '#ff00ff'; ctx.fillRect(a.x - a.width/2, a.y - a.height/2, a.width, a.height); }
            });

            if (boss) {
                ctx.shadowColor = '#ff0000';
                if (alienImg.complete && alienImg.naturalHeight !== 0) ctx.drawImage(alienImg, boss.x - boss.width/2, boss.y - boss.height/2, boss.width, boss.height);
                else { ctx.fillStyle = '#ff0000'; ctx.fillRect(boss.x - boss.width/2, boss.y - boss.height/2, boss.width, boss.height); }
                ctx.shadowBlur = 0; ctx.fillStyle = '#333'; ctx.fillRect(boss.x - 50, boss.y - boss.height/2 - 20, 100, 10);
                ctx.fillStyle = '#f00'; ctx.fillRect(boss.x - 50, boss.y - boss.height/2 - 20, 100 * (boss.hp / boss.maxHp), 10);
            }

            ctx.shadowBlur = 15; ctx.shadowColor = '#ff8800'; ctx.strokeStyle = '#ffaa00'; ctx.fillStyle = '#221100'; ctx.lineWidth = 2;
            asteroids.forEach(ast => {
                ctx.save(); ctx.translate(ast.x, ast.y); ctx.rotate(ast.angle); ctx.beginPath();
                for(let i = 0; i < ast.vertices.length; i++) {
                    let a = (i / ast.vertices.length) * Math.PI * 2; let r = ast.vertices[i]; let x = Math.cos(a) * r; let y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
            });

            ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff'; ctx.fillStyle = '#ffffff'; 
            bullets.forEach(b => { 
                if(b.pierce) { ctx.shadowColor = '#ff00ff'; ctx.fillRect(b.x - 5, b.y - 25, 10, 50); } 
                else { ctx.fillRect(b.x - 2, b.y - 8, 4, 16); }
            });

            ctx.shadowColor = '#ff0000'; ctx.fillStyle = '#ffaaaa'; 
            enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); });

            powerups.forEach(p => {
                ctx.shadowColor = p.color; ctx.fillStyle = '#222'; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = p.color; ctx.font = "bold 16px Courier"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(p.letter, p.x, p.y + 1);
            });

            ctx.shadowBlur = 0; 
            for(let f of flashes) {
                ctx.globalAlpha = f.life; ctx.shadowBlur = 20; ctx.shadowColor = f.color; ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2); ctx.fill();
            }
            for(let p of particles) {
                ctx.globalAlpha = p.life; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.fillStyle = p.life > 0.6 ? '#ffffff' : p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0; 
        }

        function loop(timestamp) {
            if (!timestamp) timestamp = 0;
            update(timestamp);
            draw(timestamp);
            animationId = requestAnimationFrame(loop);
        }

        // --- INPUT ---
        const shootBtn = document.getElementById('shoot-btn');
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameState !== 'PLAYING') return; input.shoot = true; unlockAudio(); }, {passive: false});
        shootBtn.addEventListener('touchend', (e) => { e.preventDefault(); input.shoot = false; }, {passive: false});
        shootBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); input.shoot = false; }, {passive: false});

        document.getElementById('nuke-btn').addEventListener('touchstart', (e) => { e.preventDefault(); if(gameState !== 'PLAYING') return; triggerNuke(); unlockAudio(); }, {passive: false});

        window.addEventListener('keydown', (e) => {
            unlockAudio(); 
            if (gameState !== 'PLAYING') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w') input.up = true;
            if (e.key === 'ArrowDown' || e.key === 's') input.down = true;
            if (e.key === ' ') input.shoot = true;
            if (e.key === 'Shift' || e.key === 'n') triggerNuke();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') input.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') input.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w') input.up = false;
            if (e.key === 'ArrowDown' || e.key === 's') input.down = false;
            if (e.key === ' ') input.shoot = false;
        });

        // VIRTUAL JOYSTICK
        const joyBase = document.getElementById('joystick-base');
        const joyKnob = document.getElementById('joystick-knob');
        const maxDist = 35; let joyActive = false; let joyTouchId = null; let joyOriginX = 0; let joyOriginY = 0;

        function updateJoystick(clientX, clientY) {
            let deltaX = clientX - joyOriginX; let deltaY = clientY - joyOriginY;
            let dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            if (dist > maxDist) { deltaX = (deltaX / dist) * maxDist; deltaY = (deltaY / dist) * maxDist; }
            input.joyX = deltaX / maxDist; input.joyY = deltaY / maxDist;
            joyKnob.style.transition = 'none'; 
            joyKnob.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
        }

        joyBase.addEventListener('touchstart', (e) => {
            e.preventDefault(); unlockAudio();
            if (joyActive || gameState !== 'PLAYING') return; 
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i]; joyTouchId = touch.identifier; joyActive = true;
                const rect = joyBase.getBoundingClientRect();
                joyOriginX = rect.left + rect.width / 2; joyOriginY = rect.top + rect.height / 2;
                updateJoystick(touch.clientX, touch.clientY); break; 
            }
        }, {passive: false});

        joyBase.addEventListener('touchmove', (e) => {
            e.preventDefault(); if (!joyActive || gameState !== 'PLAYING') return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joyTouchId) { updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY); break; }
            }
        }, {passive: false});

        const resetJoystick = (e) => {
            e.preventDefault(); if (!joyActive) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joyTouchId) {
                    joyActive = false; joyTouchId = null; input.joyX = 0; input.joyY = 0;
                    joyKnob.style.transition = 'transform 0.1s ease-out'; joyKnob.style.transform = `translate(-50%, -50%)`; break;
                }
            }
        };

        joyBase.addEventListener('touchend', resetJoystick, {passive: false});
        joyBase.addEventListener('touchcancel', resetJoystick, {passive: false});

        // INIT
        initStars();
        showStartMenu();
    </script>
</body>
